openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Orakzai Properties API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: properties
    description: Property listings
  - name: projects
    description: Mega real estate projects
  - name: updates
    description: Project development updates
  - name: bookings
    description: Down-payment booking inquiries
  - name: investment
    description: Fractional investment projects

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /properties:
    get:
      operationId: listProperties
      tags: [properties]
      summary: List/search properties
      parameters:
        - name: city
          in: query
          schema:
            type: string
        - name: category
          in: query
          schema:
            type: string
        - name: type
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
    post:
      operationId: createProperty
      tags: [properties]
      summary: Create a new property listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePropertyBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "401":
          description: Unauthorized

  /properties/{id}:
    get:
      operationId: getProperty
      tags: [properties]
      summary: Get a single property
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Property detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "404":
          description: Not found
    patch:
      operationId: updateProperty
      tags: [properties]
      summary: Update a property listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePropertyBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Property"
        "401":
          description: Unauthorized
        "404":
          description: Not found
    delete:
      operationId: deleteProperty
      tags: [properties]
      summary: Delete a property listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
        "404":
          description: Not found

  /properties/stats:
    get:
      operationId: getPropertyStats
      tags: [properties]
      summary: Get marketplace stats (counts by city, type, category)
      responses:
        "200":
          description: Property statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PropertyStats"

  /properties/my:
    get:
      operationId: getMyProperties
      tags: [properties]
      summary: Get the authenticated user's property listings
      responses:
        "200":
          description: My properties
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Property"
        "401":
          description: Unauthorized

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all mega projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a single project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found

  /projects/{id}/updates:
    get:
      operationId: listProjectUpdates
      tags: [updates]
      summary: List construction/development updates for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project updates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectUpdate"
    post:
      operationId: createProjectUpdate
      tags: [updates]
      summary: Post a new development update (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectUpdateBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectUpdate"
        "401":
          description: Unauthorized

  /bookings:
    post:
      operationId: createBooking
      tags: [bookings]
      summary: Submit a booking/down-payment inquiry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBookingBody"
      responses:
        "201":
          description: Booking submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Booking"
    get:
      operationId: listMyBookings
      tags: [bookings]
      summary: List current user's bookings
      responses:
        "200":
          description: My bookings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Booking"
        "401":
          description: Unauthorized

  /investment-projects:
    get:
      operationId: listInvestmentProjects
      tags: [investment]
      summary: List all fractional investment projects
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of investment projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InvestmentProject"
    post:
      operationId: createInvestmentProject
      tags: [investment]
      summary: Create a new investment project (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvestmentProjectBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentProject"
        "401":
          description: Unauthorized

  /investment-projects/{id}:
    get:
      operationId: getInvestmentProject
      tags: [investment]
      summary: Get a single investment project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Investment project detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentProject"
        "404":
          description: Not found

  /investment-projects/{id}/invest:
    post:
      operationId: buyShares
      tags: [investment]
      summary: Purchase shares in an investment project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuySharesBody"
      responses:
        "201":
          description: Transaction confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InvestmentTransaction"
        "400":
          description: Insufficient shares or invalid input
        "401":
          description: Unauthorized
        "404":
          description: Project not found

  /portfolio:
    get:
      operationId: getMyPortfolio
      tags: [investment]
      summary: Get the authenticated user's investment portfolio
      responses:
        "200":
          description: User portfolio
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioItem"
        "401":
          description: Unauthorized

  /portfolio/dashboard:
    get:
      operationId: getPortfolioDashboard
      tags: [investment]
      summary: Aggregated investor dashboard with wallet, positions, ledger, and performance history
      responses:
        "200":
          description: Full portfolio dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioDashboard"
        "401":
          description: Unauthorized

  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List all notifications for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: List of notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationList"
        "401":
          description: Unauthorized
    delete:
      operationId: clearAllNotifications
      tags: [notifications]
      summary: Clear all notifications for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized

  /notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      security:
        - bearerAuth: []
      responses:
        "200":
          description: All marked as read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized

  /notifications/settings:
    get:
      operationId: getNotificationSettings
      tags: [notifications]
      summary: Get notification preferences for the user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"
        "401":
          description: Unauthorized
    patch:
      operationId: updateNotificationSettings
      tags: [notifications]
      summary: Update notification preferences
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotificationSettingsBody"
      responses:
        "200":
          description: Updated settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationSettingsResponse"
        "401":
          description: Unauthorized

  /notifications/push-subscribe:
    post:
      operationId: subscribePush
      tags: [notifications]
      summary: Store a Web Push subscription for the user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushSubscribeBody"
      responses:
        "200":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized

  /agent/dashboard:
    get:
      operationId: getAgentDashboard
      tags: [agent]
      summary: Aggregated agent dashboard with stats, listings, and leads
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDashboard"
        "401":
          description: Unauthorized

  /agent/profile:
    get:
      operationId: getAgentProfile
      tags: [agent]
      summary: Get agent profile for the authenticated user
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Agent profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"
        "401":
          description: Unauthorized
    patch:
      operationId: updateAgentProfile
      tags: [agent]
      summary: Create or update agent profile
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentProfile"
        "401":
          description: Unauthorized

  /agent/lead:
    post:
      operationId: recordLead
      tags: [agent]
      summary: Record an inquiry lead on a property
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLeadBody"
      responses:
        "200":
          description: Lead recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Property:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        city:
          type: string
        area:
          type: ["string", "null"]
        category:
          type: string
          description: "buy | rent | sell"
        type:
          type: string
          description: "plot | house | commercial"
        images:
          type: array
          items:
            type: string
        ownerId:
          type: string
        ownerName:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        whatsappNumber:
          type: ["string", "null"]
        isVerified:
          type: boolean
        ownerAvatar:
          type: ["string", "null"]
        ownerRating:
          type: ["number", "null"]
        beds:
          type: ["integer", "null"]
        baths:
          type: ["integer", "null"]
        areaSqft:
          type: ["integer", "null"]
        isAvailable:
          type: boolean
        furnishedStatus:
          type: ["string", "null"]
          description: "fully_furnished | semi_furnished | unfurnished"
        occupancyType:
          type: ["string", "null"]
          description: "family | bachelor | office_commercial"
        rentalDuration:
          type: ["string", "null"]
          description: "short_term | long_term"
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - description
        - price
        - city
        - category
        - type
        - images
        - ownerId
        - isVerified
        - isAvailable
        - createdAt
        - updatedAt

    CreatePropertyBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        city:
          type: string
        area:
          type: ["string", "null"]
        category:
          type: string
        type:
          type: string
        images:
          type: array
          items:
            type: string
        ownerName:
          type: ["string", "null"]
        ownerPhone:
          type: ["string", "null"]
        whatsappNumber:
          type: ["string", "null"]
        beds:
          type: ["integer", "null"]
        baths:
          type: ["integer", "null"]
        areaSqft:
          type: ["integer", "null"]
        furnishedStatus:
          type: ["string", "null"]
        occupancyType:
          type: ["string", "null"]
        rentalDuration:
          type: ["string", "null"]
      required:
        - title
        - description
        - price
        - city
        - category
        - type
        - images

    UpdatePropertyBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        city:
          type: string
        area:
          type: ["string", "null"]
        category:
          type: string
        type:
          type: string
        images:
          type: array
          items:
            type: string
        ownerPhone:
          type: ["string", "null"]
        whatsappNumber:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        furnishedStatus:
          type: ["string", "null"]
        occupancyType:
          type: ["string", "null"]
        rentalDuration:
          type: ["string", "null"]

    PropertyStats:
      type: object
      properties:
        total:
          type: integer
        byCity:
          type: array
          items:
            $ref: "#/components/schemas/CountEntry"
        byType:
          type: array
          items:
            $ref: "#/components/schemas/CountEntry"
        byCategory:
          type: array
          items:
            $ref: "#/components/schemas/CountEntry"
      required:
        - total
        - byCity
        - byType
        - byCategory

    CountEntry:
      type: object
      properties:
        label:
          type: string
        count:
          type: integer
      required:
        - label
        - count

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        location:
          type: string
        bannerImage:
          type: ["string", "null"]
        plotSizes:
          type: array
          items:
            type: string
        pricePerMarla:
          type: number
        totalPlots:
          type: ["integer", "null"]
        progressPercent:
          type: integer
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - description
        - location
        - plotSizes
        - pricePerMarla
        - progressPercent
        - status
        - createdAt

    ProjectUpdate:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
        createdAt:
          type: string
      required:
        - id
        - projectId
        - title
        - content
        - createdAt

    CreateProjectUpdateBody:
      type: object
      properties:
        title:
          type: string
        content:
          type: string
        imageUrl:
          type: ["string", "null"]
      required:
        - title
        - content

    Booking:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        userId:
          type: ["string", "null"]
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        plotSize:
          type: string
        message:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string
      required:
        - id
        - projectId
        - name
        - phone
        - plotSize
        - status
        - createdAt

    CreateBookingBody:
      type: object
      properties:
        projectId:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        plotSize:
          type: string
        message:
          type: ["string", "null"]
      required:
        - projectId
        - name
        - phone
        - plotSize

    RoadmapPhase:
      type: object
      properties:
        phase:
          type: string
        description:
          type: string
        status:
          type: string
          description: "pending | in_progress | completed"
        date:
          type: string
      required:
        - phase
        - description
        - status
        - date

    InvestmentProject:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        location:
          type: string
        bannerImage:
          type: ["string", "null"]
        totalValue:
          type: number
        minInvestment:
          type: number
        totalShares:
          type: integer
        fundedShares:
          type: integer
        roi:
          type: string
        duration:
          type: string
        status:
          type: string
          description: "funding | construction | completed"
        type:
          type: string
          description: "plaza | tower | smart_city | commercial"
        roadmap:
          type: array
          items:
            $ref: "#/components/schemas/RoadmapPhase"
        features:
          type: array
          items:
            type: string
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - title
        - description
        - location
        - totalValue
        - minInvestment
        - totalShares
        - fundedShares
        - roi
        - duration
        - status
        - type
        - roadmap
        - features
        - createdAt
        - updatedAt

    BuySharesBody:
      type: object
      properties:
        shares:
          type: integer
          minimum: 1
      required:
        - shares

    InvestmentTransaction:
      type: object
      properties:
        transactionId:
          type: string
        projectId:
          type: integer
        projectTitle:
          type: string
        sharesBought:
          type: integer
        amountPaid:
          type: number
        sharePrice:
          type: number
        roi:
          type: string
        duration:
          type: string
        status:
          type: string
        createdAt:
          type: string
        portfolio:
          type: object
          properties:
            totalShares:
              type: integer
            totalInvested:
              type: number
          required:
            - totalShares
            - totalInvested
      required:
        - transactionId
        - projectId
        - projectTitle
        - sharesBought
        - amountPaid
        - sharePrice
        - roi
        - duration
        - status
        - createdAt
        - portfolio

    PerformancePoint:
      type: object
      properties:
        month:
          type: string
        value:
          type: number
        invested:
          type: number
      required: [month, value, invested]

    LedgerItem:
      type: object
      properties:
        transactionId:
          type: string
        projectId:
          type: integer
        projectTitle:
          type: string
        sharesBought:
          type: integer
        amountPaid:
          type: number
        sharePrice:
          type: number
        status:
          type: string
        createdAt:
          type: string
      required: [transactionId, projectId, projectTitle, sharesBought, amountPaid, sharePrice, status, createdAt]

    PortfolioPosition:
      type: object
      properties:
        portfolioId:
          type: integer
        projectId:
          type: integer
        projectTitle:
          type: string
        projectLocation:
          type: string
        projectStatus:
          type: string
        projectType:
          type: string
        roi:
          type: string
        duration:
          type: string
        totalShares:
          type: integer
        totalProjectShares:
          type: integer
        totalInvested:
          type: number
        currentValue:
          type: number
        sharePrice:
          type: number
        gain:
          type: number
        gainPct:
          type: number
        projectedMonthlyRoi:
          type: number
        updatedAt:
          type: string
      required:
        - portfolioId
        - projectId
        - projectTitle
        - projectLocation
        - projectStatus
        - projectType
        - roi
        - duration
        - totalShares
        - totalProjectShares
        - totalInvested
        - currentValue
        - sharePrice
        - gain
        - gainPct
        - projectedMonthlyRoi
        - updatedAt

    PortfolioDashboard:
      type: object
      properties:
        wallet:
          type: object
          properties:
            balance:
              type: number
            currency:
              type: string
          required: [balance, currency]
        summary:
          type: object
          properties:
            totalAssets:
              type: number
            investedCapital:
              type: number
            unrealizedPnL:
              type: number
            unrealizedPnLPct:
              type: number
            projectedAnnualIncome:
              type: number
            totalPositions:
              type: integer
            totalShares:
              type: integer
          required: [totalAssets, investedCapital, unrealizedPnL, unrealizedPnLPct, projectedAnnualIncome, totalPositions, totalShares]
