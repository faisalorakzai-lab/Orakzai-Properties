<!DOCTYPE html>
  <html lang="en" style="background:#040b14">
    <head>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
      <title>Orakzai Properties</title>
      <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
      <link rel="preconnect" href="https://fonts.googleapis.com">
      <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
      <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Plus+Jakarta+Sans:wght@400;600&display=swap" rel="stylesheet">
      <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #040b14; min-height: 100dvh; }
        #root { min-height: 100dvh; background: #040b14; }

        /* Native splash — visible before React mounts, removed by React instantly */
        #splash {
          position: fixed; inset: 0; z-index: 99999;
          background: #040b14; display: flex;
          flex-direction: column; align-items: center; justify-content: center; gap: 28px;
          transition: opacity 0.25s ease;
        }
        #splash.hidden { opacity: 0; pointer-events: none; }

        .splash-logo {
          display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        .splash-emblem {
          width: 68px; height: 68px; border-radius: 18px;
          background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
          border: 1.5px solid rgba(201,168,76,0.35);
          display: flex; align-items: center; justify-content: center;
          box-shadow: 0 0 40px rgba(201,168,76,0.12);
        }
        .splash-emblem svg { opacity: 0.9; }
        .splash-name {
          font-family: 'Playfair Display', serif;
          font-size: 22px; font-weight: 700; letter-spacing: 0.01em;
          color: #EEF2FF;
        }
        .splash-tagline {
          font-family: 'Plus Jakarta Sans', sans-serif;
          font-size: 12px; color: rgba(201,168,76,0.7);
          letter-spacing: 0.12em; text-transform: uppercase; font-weight: 600;
        }
        .splash-ring {
          width: 48px; height: 48px; border-radius: 50%;
          border: 2.5px solid rgba(201,168,76,0.12);
          border-top-color: #C9A84C;
          animation: spin 0.85s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .splash-dots {
          display: flex; gap: 6px; align-items: center;
        }
        .splash-dot {
          width: 6px; height: 6px; border-radius: 50%;
          background: rgba(201,168,76,0.3);
          animation: pulse 1.4s ease-in-out infinite;
        }
        .splash-dot:nth-child(2) { animation-delay: 0.2s; }
        .splash-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse {
          0%, 100% { background: rgba(201,168,76,0.2); transform: scale(1); }
          50%       { background: rgba(201,168,76,0.9); transform: scale(1.3); }
        }

        /* Ambient glow */
        .splash-glow {
          position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
          width: 300px; height: 200px; border-radius: 50%;
          background: radial-gradient(ellipse, rgba(201,168,76,0.06) 0%, transparent 70%);
          pointer-events: none;
        }
      </style>
    </head>
    <body>
      <!-- Native splash: shows IMMEDIATELY, dismissed when React mounts -->
      <div id="splash" aria-hidden="true">
        <div class="splash-glow"></div>
        <div class="splash-logo">
          <div class="splash-emblem">
            <svg width="36" height="36" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M18 4L32 13V28H4V13L18 4Z" stroke="#C9A84C" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
              <path d="M13 28V20C13 18.343 14.343 17 16 17H20C21.657 17 23 18.343 23 20V28" stroke="#C9A84C" stroke-width="1.5" stroke-linejoin="round"/>
              <circle cx="18" cy="11" r="2" fill="#C9A84C" opacity="0.7"/>
            </svg>
          </div>
          <div>
            <div class="splash-name">Orakzai Properties</div>
            <div class="splash-tagline">Global Real Estate Intelligence</div>
          </div>
        </div>
        <div class="splash-ring"></div>
        <div class="splash-dots">
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
          <div class="splash-dot"></div>
        </div>
      </div>

      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>

      <!-- Dismiss splash as soon as React has rendered anything -->
      <script>
        (function() {
          var splash = document.getElementById('splash');
          var observer = new MutationObserver(function() {
            var root = document.getElementById('root');
            if (root && root.firstChild) {
              splash.classList.add('hidden');
              setTimeout(function() { splash.style.display = 'none'; }, 300);
              observer.disconnect();
            }
          });
          observer.observe(document.getElementById('root'), { childList: true, subtree: true });
          // Failsafe: remove after 6 seconds no matter what
          setTimeout(function() {
            splash.classList.add('hidden');
            setTimeout(function() { splash.style.display = 'none'; }, 300);
          }, 6000);
        })();
      </script>
    </body>
  </html>
